name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================
  # Build Windows
  # ===========================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chainlink
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: cargo build --release

      - name: Upload artifact (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: chainlink-x86_64-pc-windows-msvc
          path: chainlink/target/release/chainlink.exe

  # ===========================================
  # Publish GitHub Release
  # ===========================================
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: chainlink-*
          merge-multiple: true
          path: artifacts

      - name: Rename artifact to friendly name
        run: |
          mv artifacts/chainlink.exe artifacts/chainlink-windows-x86_64.exe

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.exe > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/chainlink-windows-x86_64.exe
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
