name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================
  # Build Windows
  # ===========================================
  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chainlink
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: chainlink-${{ matrix.target }}
          path: chainlink/target/${{ matrix.target }}/release/chainlink.exe

  # ===========================================
  # Publish GitHub Release
  # ===========================================
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: chainlink-*
          merge-multiple: true
          path: artifacts

      - name: Rename artifacts to friendly names
        run: |
          mv artifacts/chainlink-x86_64-pc-windows-msvc.exe  artifacts/chainlink-windows-x86_64.exe
          mv artifacts/chainlink-aarch64-pc-windows-msvc.exe artifacts/chainlink-windows-arm64.exe

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.exe > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/chainlink-windows-x86_64.exe
            artifacts/chainlink-windows-arm64.exe
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
